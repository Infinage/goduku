<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goduku</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #121214;
            --surface: #1e1e22;
            --text: #e0e0e0;
            --accent: #4a9eff;
            --invalid: #442222;
            --invalid-text: #ffaaaa;
            --border-light: #333;
            --border-thick: #555;
            --cell-size: 50px;
            --grid-gap: 1px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            margin-top: clamp(5px, 2vh, 20px); 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            font-weight: 900;
            margin-bottom: clamp(15px, 5vh, 30px);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: clamp(0.3rem, 2vw, 0.8rem);
            background: linear-gradient(to bottom, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(74, 158, 255, 0.3));
            animation: tracking-in-expand 0.7s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        @keyframes tracking-in-expand {
            0% { letter-spacing: -0.5em; opacity: 0; }
            40% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            background-color: var(--border-light);
            border: 4px solid var(--border-thick);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            gap: var(--grid-gap);
            touch-action: manipulation;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            padding: 0;
            border: none;
            text-align: center;
            font-size: clamp(16px, 4vw, 22px); 
            outline: none;
            background: var(--surface);
            color: var(--text);
            transition: background 0.1s, box-shadow 0.1s;
            box-sizing: border-box;
            border-radius: 0;
            -webkit-appearance: none;
        }

        .cell.highlight { background: #25252b; }

        .cell[data-row="3"], .cell[data-row="6"] { box-shadow: inset 0 3px 0 0 var(--border-thick); }
        .cell[data-col="3"], .cell[data-col="6"] { box-shadow: inset 3px 0 0 0 var(--border-thick); }
        .cell[data-row="3"][data-col="3"], .cell[data-row="3"][data-col="6"],
        .cell[data-row="6"][data-col="3"], .cell[data-row="6"][data-col="6"] {
            box-shadow: inset 3px 3px 0 0 var(--border-thick);
        }

        .cell:focus {
            background: #2a2a30;
            box-shadow: inset 0 0 0 2px var(--accent) !important;
            z-index: 5;
        }

        .cell:disabled {
            background: #16161a;
            color: var(--accent);
            font-weight: bold;
            cursor: default;
        }

        .cell.invalid {
            background: var(--invalid);
            color: var(--invalid-text);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: calc(9 * var(--cell-size) + 8px);
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 90px;
            padding: 12px 15px;
            border: 1px solid var(--border-light);
            background: var(--surface);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: #2a2a30;
            border-color: var(--accent);
        }

        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--accent);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            z-index: 100;
        }

        #toast.error {
            background-color: #ff4a4a;
            box-shadow: 0 0 20px rgba(255, 74, 74, 0.4);
        }

        #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 1.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 40px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        @media (max-width: 500px) {
            :root { --cell-size: calc((100vw - 30px) / 9); }
            .grid { border-width: 2px; }
            button { padding: 10px 5px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <h1 id="logo" style="cursor: pointer;" onclick="hardReset()">GODUKU</h1>
    <div id="grid" class="grid"></div>
    <div class="controls">
        <button id="genBtn" disabled>GENERATE</button>
        <button id="solveBtn" disabled>SOLVE</button>
        <button id="clearBtn">CLEAR</button>
    </div>
    <div id="toast"></div>

    <script src="wasm_exec.js"></script>
    <script>
        const go = new Go();
        const genBtn = document.getElementById("genBtn");
        const solveBtn = document.getElementById("solveBtn");
        const clearBtn = document.getElementById("clearBtn");

        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
        .then((result) => {
            go.run(result.instance);
            genBtn.disabled = false;
            solveBtn.disabled = false;
        }).catch(err => {
            console.error("WASM Load Error", err);
        });

        const gridContainer = document.getElementById("grid");
        const getCells = () => document.querySelectorAll(".cell");

        function clearHighlights() {
            getCells().forEach(c => c.classList.remove("highlight"));
        }

        function highlightContext(activeIdx) {
            clearHighlights();
            if (activeIdx === null || isNaN(activeIdx)) return;

            const row = Math.floor(activeIdx / 9);
            const col = activeIdx % 9;
            const gridRow = Math.floor(row / 3) * 3;
            const gridCol = Math.floor(col / 3) * 3;

            getCells().forEach((cell, i) => {
                const r = Math.floor(i / 9);
                const c = i % 9;
                const isSameRow = r === row;
                const isSameCol = c === col;
                const isSameGrid = (r >= gridRow && r < gridRow + 3 && c >= gridCol && c < gridCol + 3);

                if ((isSameRow || isSameCol || isSameGrid) && i !== activeIdx) {
                    cell.classList.add("highlight");
                }
            });
        }

        for (let i = 0; i < 81; i++) {
            const input = document.createElement("input");
            input.type = "text";
            input.inputMode = "numeric";
            input.className = "cell";
            input.dataset.idx = i;
            input.dataset.row = Math.floor(i / 9);
            input.dataset.col = i % 9;

            input.addEventListener("focus", (e) => {
                input.select();
                highlightContext(parseInt(e.target.dataset.idx));
            });

            input.addEventListener("blur", () => clearHighlights());

            input.addEventListener("input", (e) => {
                const val = e.target.value.replace(/[^1-9]/g, "");
                e.target.value = val.slice(-1);
                debouncedValidate();
                setTimeout(() => checkCompletion(), 50);
            });

            gridContainer.appendChild(input);
        }

        const showToast = (msg, type = "success") => {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            if (type === "error") t.classList.add("error");
            setTimeout(() => { t.classList.remove("show", "error"); }, 1900);
        };

        function getCSV() {
            return Array.from(getCells()).map(i => i.value || "0").join(",");
        }

        function setCSV(csv) {
            const vals = csv.match(/[0-9.]/g);
            if (!vals || vals.length !== 81) {
                showToast("Invalid board", "error");
                return;
            }
            getCells().forEach((el, i) => {
                const v = vals[i];
                el.value = (v === "0" || v === ".") ? "" : v;
                el.disabled = (el.value !== "");
            });
            validateBoard();
        }

        let validateTimer;
        function debouncedValidate() {
            clearTimeout(validateTimer);
            validateTimer = setTimeout(validateBoard, 100);
        }

        function validateBoard() {
            if (typeof window.validate !== "function") return;
            const res = window.validate(getCSV());
            getCells().forEach(c => c.classList.remove("invalid"));
            if (res.success && res.data) {
                res.data.forEach(({row, col}) => {
                    getCells()[row * 9 + col].classList.add("invalid");
                });
            }
            return res;
        }

        function checkCompletion() {
            const cells = Array.from(getCells());
            const allFilled = cells.every(c => c.value !== "");
            if (allFilled) {
                validateBoard();
                const hasErrors = document.querySelectorAll(".invalid").length > 0;
                if (!hasErrors) triggerWin();
                else {
                    showToast("Almost there, but some errors remain!", "error");
                    shake();
                }
            }
        }

        function triggerWin() {
            showToast("Congrats!", "success");
            const end = Date.now() + 3000;
            const colors = ['#4a9eff', '#ffffff'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function move(row, col, dr, dc) {
            let r = row, c = col;
            while (true) {
                r += dr; c += dc;
                if (r < 0 || r >= 9 || c < 0 || c >= 9) return getCells()[row * 9 + col];
                const next = getCells()[r * 9 + c];
                if (!next.disabled) return next;
            }
        }

        function shake() {
            gridContainer.style.animation = "none";
            gridContainer.offsetHeight;
            gridContainer.style.animation = "shake 0.4s";
        }

        document.addEventListener("keydown", async (e) => {
            const active = document.activeElement;
            const isCell = active && active.classList.contains("cell");
            const key = e.key.toLowerCase();
            
            if (!isCell) return;

            const idx = parseInt(active.dataset.idx);
            const row = Math.floor(idx / 9);
            const col = idx % 9;

            if (e.key === "Escape") { active.blur(); clearHighlights(); return; }
            if (e.ctrlKey && key === "c") {
                e.preventDefault();
                await navigator.clipboard.writeText(getCSV());
                showToast("Copied board state");
                return;
            }

            let target = null;
            if (key === "arrowright" || key === "l") target = move(row, col, 0, 1);
            else if (key === "arrowleft" || key === "h") target = move(row, col, 0, -1);
            else if (key === "arrowdown" || key === "j") target = move(row, col, 1, 0);
            else if (key === "arrowup" || key === "k") target = move(row, col, -1, 0);

            if (target) {
                e.preventDefault();
                if (target !== active) target.focus();
                return;
            }

            if (key === "backspace" || key === "delete") {
                if (!active.disabled) { active.value = ""; debouncedValidate(); }
                return;
            }
        });

        document.addEventListener("paste", (e) => {
            const text = e.clipboardData.getData("text");
            const vals = text.match(/[0-9.]/g);
            if (vals && vals.length === 81) {
                e.preventDefault();
                setCSV(text);
                showToast("Board Pasted");
            } else {
                showToast("Invalid board", "error");
                shake();
            }
        });

        genBtn.onclick = () => {
            if (typeof window.generate !== "function") return;
            const res = window.generate();
            if (res.success) setCSV(res.data);
        };

        solveBtn.onclick = () => {
            if (typeof window.solve !== "function") return;
            const res = window.solve(getCSV());
            if (res.success && res.data) {
                const vals = Array.from(res.data.replace(/[^1-9]/g, ""));
                getCells().forEach((el, i) => { if (!el.value) el.value = vals[i]; });
                validateBoard();
                showToast("Solved!", "success");
            } else {
                showToast(res.error || "Unsolvable Board!", "error");
                shake();
            }
        };

        clearBtn.onclick = () => {
            getCells().forEach(el => {
                el.classList.remove("invalid");
                if (!el.disabled && el.value !== "") el.value = "";
            });
            showToast("Grid Cleared");
        };

        function hardReset() {
            getCells().forEach(el => {
                el.value = ""; el.disabled = false;
                el.classList.remove("invalid");
            });
            validateBoard();
            showToast("System Hard Reset", "success");
            shake();
        }
    </script>
</body>
</html>
