<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Goduku</title>
    <style>
      :root {
          --bg: #121214;
          --surface: #1e1e22;
          --text: #e0e0e0;
          --accent: #4a9eff;
          --invalid: #442222;
          --invalid-text: #ffaaaa;
          --border-light: #444;
          --border-thick: #333;
      }

      body {
          font-family: 'Inter', system-ui, -apple-system, sans-serif;
          background: var(--bg);
          color: var(--text);
          display: flex;
          flex-direction: column;
          align-items: center;
          min-height: 100vh;
          margin: 0;
          padding-top: 40px;
      }

      h1 {
          letter-spacing: 4px;
          font-weight: 300;
          color: var(--accent);
          margin-bottom: 30px;
      }

      .grid {
          display: grid;
          grid-template-columns: repeat(9, 50px);
          border: 3px solid var(--border-thick);
          box-shadow: 0 20px 50px rgba(0,0,0,0.5);
          background: var(--border-light);
      }

      .cell {
          width: 50px;
          height: 50px;
          text-align: center;
          font-size: 22px;
          border: 0.5px solid var(--border-light);
          outline: none;
          background: var(--surface);
          color: var(--text);
          transition: background 0.1s, box-shadow 0.1s;
      }

      /* 3x3 Cage Dividers */
      .cell:nth-child(9n+4), .cell:nth-child(9n+7) { border-left: 3px solid var(--border-thick); }
      .cell:nth-child(n+28):nth-child(-n+36), .cell:nth-child(n+55):nth-child(-n+63) { border-top: 3px solid var(--border-thick); }

      .cell:focus {
          background: #2a2a30;
          box-shadow: inset 0 0 0 2px var(--accent);
          z-index: 5;
      }

      .cell:disabled {
          background: #16161a;
          color: var(--accent);
          font-weight: bold;
          cursor: default;
      }

      .cell.invalid {
          background: var(--invalid);
          color: var(--invalid-text);
      }

      .controls {
          margin-top: 30px;
          display: flex;
          gap: 15px;
      }

      button {
          padding: 12px 28px;
          border: 1px solid var(--border-light);
          background: var(--surface);
          color: var(--text);
          border-radius: 6px;
          cursor: pointer;
          font-weight: 600;
          transition: all 0.2s ease;
      }

      button:hover:not(:disabled) {
          background: #2a2a30;
          border-color: var(--accent);
      }

      button:disabled { opacity: 0.2; cursor: not-allowed; }

      #toast {
          visibility: hidden;
          min-width: 250px;
          background-color: var(--accent);
          color: #fff;
          text-align: center;
          border-radius: 8px;
          padding: 16px;
          position: fixed;
          bottom: 40px;
          font-weight: 600;
          z-index: 100;
      }

      #toast.show { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 1.5s; }
      @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
      @keyframes fadeout { from { bottom: 40px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>
    <h1>GODUKU</h1>
    <div id="grid" class="grid"></div>
    <div class="controls">
        <button id="genBtn" disabled>GENERATE</button>
        <button id="solveBtn" disabled>SOLVE</button>
    </div>
    <div id="toast"></div>

    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();

      WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
      .then((result) => {
          go.run(result.instance);
          genBtn.disabled = false;
          solveBtn.disabled = false;
      });

      const gridContainer = document.getElementById("grid");
      const getCells = () => document.querySelectorAll(".cell");

      // Initialize Grid
      for (let i = 0; i < 81; i++) {
          const input = document.createElement("input");
          input.type = "text";
          input.inputMode = "numeric";
          input.className = "cell";
          input.dataset.idx = i;

          input.addEventListener("focus", () => input.select());

          input.addEventListener("input", (e) => {
              const val = e.target.value.replace(/[^1-9]/g, "");
              e.target.value = val.slice(-1);
              debouncedValidate();
          });

          gridContainer.appendChild(input);
      }

      const showToast = (msg) => {
          const t = document.getElementById("toast");
          t.innerText = msg;
          t.className = "show";
          setTimeout(() => t.className = t.className.replace("show", ""), 1500);
      };

      function getCSV() {
          return Array.from(getCells()).map(i => i.value || "0").join(",");
      }

      function setCSV(csv) {
          const vals = csv.match(/[0-9.]/g);
          if (!vals || vals.length !== 81) {
              showToast("Invalid board");
              return;
          }
          getCells().forEach((el, i) => {
              const v = vals[i];
              el.value = (v === "0" || v === ".") ? "" : v;
              el.disabled = el.value !== "";
          });
          validateBoard();
      }

      let validateTimer;
      function debouncedValidate() {
          clearTimeout(validateTimer);
          validateTimer = setTimeout(validateBoard, 100);
      }

      function validateBoard() {
          const res = window.validate(getCSV());
          getCells().forEach(c => c.classList.remove("invalid"));
          if (res.success && res.data) {
              res.data.forEach(({row, col}) => {
                  getCells()[row * 9 + col].classList.add("invalid");
              });
          }
      }

      // Skip disabled cells during movement
      function move(row, col, dr, dc) {
          while (true) {
              row += dr;
              col += dc;
              if (row < 0 || row >= 9 || col < 0 || col >= 9) return null;
              const next = getCells()[row * 9 + col];
              if (!next.disabled) return next;
          }
      }

      // Keyboard Listeners
      document.addEventListener("keydown", async (e) => {
          const active = document.activeElement;
          const isCell = active && active.classList.contains("cell");
          const key = e.key.toLowerCase();

          // Global Escape to Blur
          if (e.key === "Escape") {
              active.blur();
              return;
          }

          // Global Copy
          if (e.ctrlKey && key === "c") {
              e.preventDefault();
              await navigator.clipboard.writeText(getCSV());
              showToast("Copied");
              return;
          }

          if (!isCell) return;

          const idx = parseInt(active.dataset.idx);
          const row = Math.floor(idx / 9);
          const col = idx % 9;
          let target = null;

          if (key === "arrowright" || key === "l") target = move(row, col, 0, 1);
          else if (key === "arrowleft" || key === "h") target = move(row, col, 0, -1);
          else if (key === "arrowdown" || key === "j") target = move(row, col, 1, 0);
          else if (key === "arrowup" || key === "k") target = move(row, col, -1, 0);
          else if (key === "backspace" || key === "delete") {
              if (!active.disabled) {
                  active.value = "";
                  debouncedValidate();
              }
              return;
          }

          if (target) {
              e.preventDefault();
              target.focus();
          }
      });

      // Global Paste
      document.addEventListener("paste", (e) => {
          const text = e.clipboardData.getData("text");
          const vals = text.match(/[0-9.]/g);
          if (vals && vals.length === 81) {
              e.preventDefault();
              setCSV(text);
              showToast("Pasted");
          }
      });

      genBtn.onclick = () => {
          const res = window.generate();
          if (res.success) setCSV(res.data);
      };

      solveBtn.onclick = () => {
          const res = window.solve(getCSV());
          if (res.success) {
              const vals = res.data.match(/[0-9]/g);
              getCells().forEach((el, i) => {
                  if (!el.value) el.value = vals[i];
              });
              validateBoard();
              showToast("Solved");
          }
      };
    </script>
</body>
</html>
